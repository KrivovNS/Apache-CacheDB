# Database Configuration
db.url=jdbc:h2:file:./data/storagedb;DB_CLOSE_DELAY=-1
db.username=sa
db.password=password

# Server Port
server.port=7070

# Session ttl
session.ttl.minutes=1440

#CacheStorageService
cache.max.memory=104857600
cache.max.memory.policy=ALLKEYSLRU
cache.persistence=false

# Telemetry
telemetry.otel.enabled=true
telemetry.otel.endpoint=http://localhost:4317
telemetry.otel.service.name=apache-cachedb
