# Server Configuration
server.port=8080

# Database Configuration
db.driver=org.h2.Driver

# Rate Limiting Configuration
ratelimit.enabled=true

# Default rate limits (requests per second)
ratelimit.default=100
ratelimit.unauthenticated=10
ratelimit.reader=50
ratelimit.admin=200
ratelimit.superadmin=500

# Rate limit cleanup interval in minutes
ratelimit.cleanup=10

# Session Configuration
session.ttl.minutes=1440

# Cache Configuration
cache.max.memory=1073741824
cache.max.memory.policy=allkeys-lru
cache.persistence=false

# Database Configuration
db.url=jdbc:h2:file:./data/storagedb;DB_CLOSE_DELAY=-1
db.username=sa
db.password=password

