# Server Configuration
server.port=8080

# Database Configuration
db.url=jdbc:h2:./data/cachedb
db.driver=org.h2.Driver

# Rate Limiting Configuration
ratelimit.enabled=true

# Default rate limits (requests per second)
ratelimit.default=100
ratelimit.unauthenticated=10
ratelimit.reader=50
ratelimit.admin=200
ratelimit.superadmin=500

# Rate limit cleanup interval in minutes
ratelimit.cleanup=10

# Session Configuration
session.ttl.minutes=1440
session.cleanup.interval=1

# Cache Configuration
cache.default.max.memory=1073741824
cache.default.policy=allkeys-lru
cache.persistence=false

# Telemetry Configuration
telemetry.enabled=true
telemetry.prometheus.port=8080